services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:v2.9.4
    container_name: 3x-ui
    volumes:
      - /opt/3x-ui/db/:/etc/x-ui/
      - /opt/3x-ui/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    network_mode: host
    restart: unless-stopped
