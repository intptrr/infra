---
- name: Install packages
  hosts: local
  gather_facts: true
  vars:
    brew_packages:
      - bat
      - eza
      - fd
      - fzf
      - git
      - jq
      - mise
      - neovim
      - ripgrep
      - starship
      - tmux
      - zoxide
      - zsh

    apt_packages:
      - bat
      - fd-find
      - fzf
      - git
      - jq
      - neovim
      - ripgrep
      - tmux
      - zsh

  tasks:
    - name: Install packages via Homebrew
      community.general.homebrew:
        name: "{{ brew_packages }}"
        state: present
      register: brew_result
      when: ansible_facts["os_family"] == "Darwin"

    - name: Install packages via apt
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        update_cache: true
      become: true
      register: apt_result
      when: ansible_facts["os_family"] == "Debian"

    - name: Show changes
      ansible.builtin.debug:
        msg: >-
          {{
            (pkg_result.changed_pkgs | default(pkg_result.stdout_lines) | default([]))
            if pkg_result.changed else 'no changes'
          }}
      vars:
        pkg_result: "{{ brew_result if ansible_facts['os_family'] == 'Darwin' else apt_result }}"
      when: pkg_result is not skipped
