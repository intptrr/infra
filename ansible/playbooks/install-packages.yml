---
- name: Install packages
  hosts: local
  gather_facts: true
  vars:
    brew_packages:
      - bat
      - eza
      - fd
      - fzf
      - git
      - jq
      - mise
      - neovim
      - ripgrep
      - starship
      - tmux
      - zoxide
      - zsh

    apt_packages:
      - bat
      - curl
      - fd-find
      - fzf
      - git
      - jq
      - neovim
      - ripgrep
      - tmux
      - zsh

  tasks:
    - name: Install packages via Homebrew
      community.general.homebrew:
        name: "{{ brew_packages }}"
        state: present
      register: brew_result
      when: ansible_facts["os_family"] == "Darwin"

    - name: Install packages via apt
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        update_cache: true
      become: true
      register: apt_result
      when: ansible_facts["os_family"] == "Debian"

    # mise, starship, zoxide and eza are not in apt; install their
    # official binaries into ~/.local/bin.
    - name: Install packages unavailable in apt
      ansible.builtin.shell: |
        set -o pipefail
        bindir="$HOME/.local/bin"
        mkdir -p "$bindir"
        logfile="${TMPDIR:-/tmp}/install-packages.log"
        : > "$logfile"
        installed=""

        if [ ! -x "$bindir/eza" ]; then
          echo "[install-packages] installing eza"
          case "$(uname -m)" in
            aarch64|arm64) target=aarch64-unknown-linux-gnu ;;
            *) target=x86_64-unknown-linux-gnu ;;
          esac
          curl -sSfL "https://github.com/eza-community/eza/releases/latest/download/eza_${target}.tar.gz" 2>>"$logfile" \
            | tar -xz -C "$bindir" >>"$logfile" 2>&1
          installed="$installed eza"
        else
          echo "[install-packages] eza already installed"
        fi

        if [ ! -x "$bindir/mise" ]; then
          echo "[install-packages] installing mise"
          curl -sSfL https://mise.run 2>>"$logfile" | sh >>"$logfile" 2>&1
          installed="$installed mise"
        else
          echo "[install-packages] mise already installed"
        fi

        if [ ! -x "$bindir/starship" ]; then
          echo "[install-packages] installing starship"
          curl -sS https://starship.rs/install.sh 2>>"$logfile" | sh -s -- --yes -b "$bindir" >>"$logfile" 2>&1
          installed="$installed starship"
        else
          echo "[install-packages] starship already installed"
        fi

        if [ ! -x "$bindir/zoxide" ]; then
          echo "[install-packages] installing zoxide"
          curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh 2>>"$logfile" | sh >>"$logfile" 2>&1
          installed="$installed zoxide"
        else
          echo "[install-packages] zoxide already installed"
        fi

        installed="${installed# }"
        if [ -n "$installed" ]; then
          echo "[install-packages] installed: $installed"
          echo "CHANGED: $installed"
        else
          echo "[install-packages] no changes"
          echo "OK"
        fi
      args:
        executable: /bin/bash
      register: tools_install
      changed_when: "'CHANGED' in tools_install.stdout"
      when: ansible_facts["os_family"] == "Debian"

    - name: Show changes
      ansible.builtin.debug:
        msg: "{{ changes if changes else 'no changes' }}"
      vars:
        brew_changes: >-
          {{ (brew_result.changed_pkgs | default([]))
             if ansible_facts['os_family'] == 'Darwin' else [] }}
        apt_changes: >-
          {{ (apt_result.stdout_lines | default([]))
             if ansible_facts['os_family'] == 'Debian' else [] }}
        tools_changes: "{{ tools_install.stdout_lines | default([]) }}"
        changes: "{{ brew_changes + apt_changes + tools_changes }}"
